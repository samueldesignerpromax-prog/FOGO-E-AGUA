<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🔥 FOGO & ÁGUA 💧 - Jogo Cooperativo</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }
        
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
        }
        
        .painel {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            gap: 15px;
            pointer-events: auto;
        }
        
        .card {
            flex: 1;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 12px;
            text-align: center;
            border: 2px solid;
            transition: all 0.3s;
        }
        
        .card.fogo { border-color: #ff6600; }
        .card.agua { border-color: #3399ff; }
        .card.ativo { transform: scale(1.02); background: rgba(0,0,0,0.95); }
        
        .card-nome { font-size: 14px; font-weight: bold; margin-bottom: 8px; }
        .fogo .card-nome { color: #ff8844; }
        .agua .card-nome { color: #44aaff; }
        
        .card-status { display: flex; justify-content: center; gap: 20px; font-size: 12px; color: white; }
        
        .barra-vida {
            width: 100%;
            height: 6px;
            background: #333;
            border-radius: 3px;
            margin-top: 8px;
            overflow: hidden;
        }
        
        .barra-preenchimento {
            height: 100%;
            transition: width 0.3s;
        }
        
        .fogo .barra-preenchimento { background: linear-gradient(90deg, #ff6600, #ffaa44); }
        .agua .barra-preenchimento { background: linear-gradient(90deg, #3399ff, #66ccff); }
        
        .objetivos {
            position: absolute;
            top: 100px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            border-radius: 10px;
            padding: 10px 15px;
            border-left: 3px solid #ffd700;
            pointer-events: auto;
        }
        
        .objetivos p { color: white; font-size: 11px; margin: 3px 0; }
        .objetivos .titulo { color: #ffd700; font-weight: bold; margin-bottom: 5px; }
        
        .botao-trocar {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #ff6600, #3399ff);
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            pointer-events: auto;
            z-index: 2000;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }
        
        .botao-trocar:active { transform: translateX(-50%) scale(0.95); }
        
        .controles-touch {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 10px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            pointer-events: auto;
        }
        
        .botao-touch {
            width: 55px;
            height: 55px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            cursor: pointer;
            border: 2px solid rgba(255,255,255,0.3);
        }
        
        .botao-touch:active { background: rgba(255,255,255,0.5); transform: scale(0.92); }
        
        .dpad { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .dpad-linha { display: flex; gap: 5px; justify-content: center; }
        
        .mensagem {
            position: absolute;
            bottom: 45%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.95);
            padding: 10px 20px;
            border-radius: 40px;
            color: #ffd700;
            font-size: 14px;
            font-weight: bold;
            white-space: nowrap;
            animation: fadeOut 2s forwards;
            pointer-events: none;
            z-index: 2000;
        }
        
        @keyframes fadeOut {
            0% { opacity: 1; transform: translateX(-50%) scale(1); }
            70% { opacity: 1; }
            100% { opacity: 0; transform: translateX(-50%) scale(1.1); visibility: hidden; }
        }
        
        .flash-dano {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            animation: flash 0.3s;
            pointer-events: none;
            z-index: 1500;
        }
        
        @keyframes flash {
            0% { background: rgba(255,0,0,0); }
            50% { background: rgba(255,0,0,0.4); }
            100% { background: rgba(255,0,0,0); }
        }
        
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            color: white;
            z-index: 10000;
        }
        
        .loader { width: 200px; height: 3px; background: #333; border-radius: 2px; margin-top: 15px; overflow: hidden; }
        .loader-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ff6600, #3399ff); animation: loading 1s ease; }
        
        @keyframes loading { from { width: 0%; } to { width: 100%; } }
        
        .gameover {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            color: white;
            z-index: 5000;
            border: 2px solid #ff4444;
            min-width: 260px;
        }
        
        .gameover h1 { color: #ff4444; font-size: 32px; margin-bottom: 15px; }
        .gameover button {
            background: linear-gradient(135deg, #ff6600, #3399ff);
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            color: white;
            font-size: 14px;
            margin-top: 15px;
            cursor: pointer;
        }
        
        @media (min-width: 768px) {
            .controles-touch { display: none; }
            .botao-trocar { bottom: 30px; }
        }
    </style>
</head>
<body>
    <div id="loading">
        <h2>🔥 FOGO & ÁGUA 💧</h2>
        <div class="loader"><div class="loader-fill"></div></div>
        <p>Carregando...</p>
    </div>

    <div id="ui" style="display: none;">
        <div class="painel">
            <div class="card fogo" id="cardFogo">
                <div class="card-nome">🔥 GUERREIRO DE FOGO</div>
                <div class="card-status">
                    <span>❤️ <span id="fogoVida">100</span></span>
                    <span>⭐ <span id="fogoGem">0</span></span>
                </div>
                <div class="barra-vida"><div class="barra-preenchimento" id="fogoVidaBar" style="width:100%"></div></div>
            </div>
            <div class="card agua" id="cardAgua">
                <div class="card-nome">💧 GUERREIRA DE ÁGUA</div>
                <div class="card-status">
                    <span>❤️ <span id="aguaVida">100</span></span>
                    <span>⭐ <span id="aguaGem">0</span></span>
                </div>
                <div class="barra-vida"><div class="barra-preenchimento" id="aguaVidaBar" style="width:100%"></div></div>
            </div>
        </div>
        
        <div class="objetivos">
            <div class="titulo">🎯 MISSÃO</div>
            <p>🔥 FOGO coleta gemas <span style="color:#ff8844">VERMELHAS</span></p>
            <p>💧 ÁGUA coleta gemas <span style="color:#44aaff">AZUIS</span></p>
            <p>🚪 Ative os 3 botões para abrir as portas</p>
            <p>👹 Fuja dos inimigos!</p>
        </div>
        
        <button class="botao-trocar" id="btnTrocar">🔄 TROCAR (TAB)</button>
        
        <div class="controles-touch">
            <div class="dpad">
                <div class="dpad-linha"><div class="botao-touch" id="btnCima">▲</div></div>
                <div class="dpad-linha">
                    <div class="botao-touch" id="btnEsquerda">◀</div>
                    <div class="botao-touch" id="btnBaixo">▼</div>
                    <div class="botao-touch" id="btnDireita">▶</div>
                </div>
            </div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.128.0/build/three.module.js';

        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth < 768;
        
        // ========== CENA ==========
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a2a);
        scene.fog = new THREE.FogExp2(0x0a0a2a, 0.01);

        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(10, 12, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // ========== LUZES ==========
        const ambientLight = new THREE.AmbientLight(0x404060, 0.6);
        scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0xfff5e6, 1.2);
        dirLight.position.set(5, 12, 4);
        dirLight.castShadow = true;
        scene.add(dirLight);
        
        const luzFogo = new THREE.PointLight(0xff4400, 0.5, 12);
        scene.add(luzFogo);
        
        const luzAgua = new THREE.PointLight(0x3399ff, 0.5, 12);
        scene.add(luzAgua);

        // ========== CHÃO ==========
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x2a1a0a, roughness: 0.7 });
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(22, 22), groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.5;
        ground.receiveShadow = true;
        scene.add(ground);
        
        const grid = new THREE.GridHelper(22, 20, 0xaa8866, 0x664422);
        grid.position.y = -0.45;
        scene.add(grid);

        // ========== PILARES ==========
        const pillarMat = new THREE.MeshStandardMaterial({ color: 0xccaa77 });
        const posPilares = [[-7,-7], [7,-7], [-7,7], [7,7], [-5,-5], [5,-5], [-5,5], [5,5]];
        posPilares.forEach(pos => {
            const pilar = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.7, 3, 8), pillarMat);
            pilar.position.set(pos[0], 1, pos[1]);
            pilar.castShadow = true;
            scene.add(pilar);
        });

        // ========== PAREDES ==========
        const walls = [];
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x8b7355 });
        
        const wallPositions = [
            { x: 0, z: -8.5, w: 17, d: 0.3 }, { x: 0, z: 8.5, w: 17, d: 0.3 },
            { x: -8.5, z: 0, w: 0.3, d: 17 }, { x: 8.5, z: 0, w: 0.3, d: 17 },
            { x: -3.5, z: -3, w: 0.3, d: 4 }, { x: 3.5, z: -2, w: 0.3, d: 4 },
            { x: -2, z: 3.5, w: 5, d: 0.3 }, { x: 2, z: 2.5, w: 4, d: 0.3 }
        ];
        
        wallPositions.forEach(w => {
            const wall = new THREE.Mesh(new THREE.BoxGeometry(w.w, 1, w.d), wallMat);
            wall.position.set(w.x, 0.5, w.z);
            wall.castShadow = true;
            scene.add(wall);
            walls.push({ x: w.x, z: w.z, sizeX: w.w / 2, sizeZ: w.d / 2 });
        });

        // ========== ZONAS DE PERIGO ==========
        const lavaMat = new THREE.MeshStandardMaterial({ color: 0xff4400, emissive: 0x441100 });
        const aguaMat = new THREE.MeshStandardMaterial({ color: 0x3399ff, emissive: 0x004466, transparent: true, opacity: 0.7 });
        
        const zonasLava = [];
        const zonasAgua = [];
        
        const lavaSpots = [[-4.5, -3.5], [4.5, -3], [-3, 4], [3.5, 3.5]];
        lavaSpots.forEach(l => {
            const lava = new THREE.Mesh(new THREE.CylinderGeometry(0.7, 0.7, 0.1, 16), lavaMat);
            lava.position.set(l[0], -0.45, l[1]);
            scene.add(lava);
            zonasLava.push({ x: l[0], z: l[1] });
        });
        
        const waterSpots = [[-4, 3.5], [4, 3.5], [-3.5, -3.5], [3, -4]];
        waterSpots.forEach(w => {
            const water = new THREE.Mesh(new THREE.CylinderGeometry(0.7, 0.7, 0.1, 16), aguaMat);
            water.position.set(w[0], -0.45, w[1]);
            scene.add(water);
            zonasAgua.push({ x: w[0], z: w[1] });
        });

        // ========== GEMAS ==========
        let gems = [];
        
        class Gema {
            constructor(x, z, tipo, cor) {
                this.x = x;
                this.z = z;
                this.tipo = tipo;
                this.coletada = false;
                const geometry = new THREE.OctahedronGeometry(0.25);
                const material = new THREE.MeshStandardMaterial({ color: cor, emissive: cor, emissiveIntensity: 0.3 });
                this.mesh = new THREE.Mesh(geometry, material);
                this.mesh.position.set(x, 0.2, z);
                this.mesh.castShadow = true;
                scene.add(this.mesh);
            }
            
            coletar() {
                this.coletada = true;
                scene.remove(this.mesh);
            }
        }
        
        const gemasFogo = [[-5, -2], [2, -5], [-2.5, 4]];
        const gemasAgua = [[5, -2], [-2, 5], [2.5, -4]];
        gemasFogo.forEach(g => gems.push(new Gema(g[0], g[1], 'fire', 0xff6600)));
        gemasAgua.forEach(g => gems.push(new Gema(g[0], g[1], 'water', 0x3399ff)));

        // ========== BOTÕES ==========
        let botoes = [];
        let portas = [];
        
        class Botao {
            constructor(x, z, id) {
                this.x = x;
                this.z = z;
                this.id = id;
                this.pressionado = false;
                
                const base = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.45, 0.1, 16), new THREE.MeshStandardMaterial({ color: 0x666666 }));
                base.position.set(x, 0.05, z);
                scene.add(base);
                
                this.mesh = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.35, 0.15, 16), new THREE.MeshStandardMaterial({ color: 0xffaa44, emissive: 0x442200 }));
                this.mesh.position.set(x, 0.15, z);
                scene.add(this.mesh);
                
                this.anel = new THREE.Mesh(new THREE.TorusGeometry(0.4, 0.05, 16, 32), new THREE.MeshStandardMaterial({ color: 0xffaa44 }));
                this.anel.position.set(x, 0.08, z);
                this.anel.rotation.x = Math.PI / 2;
                scene.add(this.anel);
            }
            
            ativar() {
                if (this.pressionado) return;
                this.pressionado = true;
                this.mesh.position.y = 0.08;
                this.mesh.material.color.setHex(0x44ff44);
                this.anel.material.color.setHex(0x44ff44);
                
                for (let porta of portas) {
                    if (porta.botaoId === this.id && !porta.aberta) {
                        porta.abrir();
                    }
                }
            }
        }
        
        class Porta {
            constructor(x, z, botaoId) {
                this.x = x;
                this.z = z;
                this.botaoId = botaoId;
                this.aberta = false;
                
                this.mesh = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.5, 0.1), new THREE.MeshStandardMaterial({ color: 0xaa8866 }));
                this.mesh.position.set(x, 0.75, z);
                this.mesh.castShadow = true;
                scene.add(this.mesh);
            }
            
            abrir() {
                if (this.aberta) return;
                this.aberta = true;
                let y = 0.75;
                const animar = () => {
                    y += 0.1;
                    this.mesh.position.y = y;
                    if (y < 2) requestAnimationFrame(animar);
                };
                animar();
            }
        }
        
        const botoesPos = [[-5, -4], [5, -4], [0, 6]];
        botoesPos.forEach((pos, i) => botoes.push(new Botao(pos[0], pos[1], i)));
        
        const portasPos = [
            { x: -2, z: -6.5, botaoId: 0 },
            { x: 2, z: -6.5, botaoId: 1 },
            { x: 0, z: 6.5, botaoId: 2 }
        ];
        portasPos.forEach(p => portas.push(new Porta(p.x, p.z, p.botaoId)));

        // ========== INIMIGOS ==========
        let inimigos = [];
        
        class Inimigo {
            constructor(x, z, cor, alvo, velocidade) {
                this.x = x;
                this.z = z;
                this.alvo = alvo;
                this.velocidade = velocidade;
                this.originalX = x;
                this.originalZ = z;
                
                const grupo = new THREE.Group();
                const corpo = new THREE.Mesh(new THREE.CylinderGeometry(0.45, 0.4, 0.8, 8), new THREE.MeshStandardMaterial({ color: cor }));
                corpo.castShadow = true;
                grupo.add(corpo);
                
                const olhoMat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0x440000 });
                const olhoEsq = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), olhoMat);
                olhoEsq.position.set(-0.15, 0.5, 0.35);
                const olhoDir = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), olhoMat);
                olhoDir.position.set(0.15, 0.5, 0.35);
                grupo.add(olhoEsq, olhoDir);
                
                grupo.position.set(x, 0, z);
                scene.add(grupo);
                this.mesh = grupo;
                this.anguloPatrulha = Math.random() * Math.PI * 2;
            }
            
            atualizar(posAlvo, delta) {
                if (!posAlvo) return;
                
                const dx = posAlvo.x - this.x;
                const dz = posAlvo.z - this.z;
                const dist = Math.hypot(dx, dz);
                
                if (dist < 5) {
                    const angulo = Math.atan2(dz, dx);
                    this.x += Math.cos(angulo) * this.velocidade * delta;
                    this.z += Math.sin(angulo) * this.velocidade * delta;
                    this.mesh.rotation.y = angulo;
                } else {
                    this.anguloPatrulha += delta * 1.5;
                    this.x = this.originalX + Math.cos(this.anguloPatrulha) * 2;
                    this.z = this.originalZ + Math.sin(this.anguloPatrulha * 0.7) * 2;
                }
                
                this.x = Math.max(-8, Math.min(8, this.x));
                this.z = Math.max(-8, Math.min(8, this.z));
                this.mesh.position.x = this.x;
                this.mesh.position.z = this.z;
                this.mesh.position.y = Math.sin(Date.now() * 0.008) * 0.05;
            }
            
            getPosicao() { return { x: this.x, z: this.z }; }
        }
        
        inimigos.push(new Inimigo(-3, -2, 0xcc3333, 'fire', 1.3));
        inimigos.push(new Inimigo(3, -2, 0x3366cc, 'water', 1.3));
        inimigos.push(new Inimigo(0, 3.5, 0xcc3333, 'fire', 1.5));

        // ========== PORTAL ==========
        let portal = {
            x: 0, z: -7, ativo: false,
            base: new THREE.Mesh(new THREE.CylinderGeometry(0.9, 1, 0.1, 16), new THREE.MeshStandardMaterial({ color: 0xffd700 })),
            anel: new THREE.Mesh(new THREE.TorusGeometry(0.7, 0.08, 16, 48), new THREE.MeshStandardMaterial({ color: 0xffaa00 }))
        };
        portal.base.position.set(portal.x, 0.05, portal.z);
        portal.anel.position.set(portal.x, 0.6, portal.z);
        portal.anel.rotation.x = Math.PI / 2;
        scene.add(portal.base, portal.anel);

        // ========== PERSONAGENS ==========
        let personagemFogo = {
            x: -3, z: -3, tipo: 'fire',
            vida: 100, gemas: 0,
            velocidade: 5,
            mesh: null
        };
        
        let personagemAgua = {
            x: 3, z: -3, tipo: 'water',
            vida: 100, gemas: 0,
            velocidade: 5,
            mesh: null
        };
        
        function criarPersonagem(x, z, cor, tipo) {
            const grupo = new THREE.Group();
            const corpo = new THREE.Mesh(new THREE.CylinderGeometry(0.45, 0.4, 0.9, 16), new THREE.MeshStandardMaterial({ color: cor, emissive: cor, emissiveIntensity: 0.2 }));
            corpo.castShadow = true;
            corpo.position.y = 0.45;
            grupo.add(corpo);
            
            const cabeca = new THREE.Mesh(new THREE.SphereGeometry(0.4, 32, 32), new THREE.MeshStandardMaterial({ color: 0xffccaa }));
            cabeca.position.y = 0.9;
            cabeca.castShadow = true;
            grupo.add(cabeca);
            
            const olhoMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const olhoEsq = new THREE.Mesh(new THREE.SphereGeometry(0.08, 16, 16), olhoMat);
            olhoEsq.position.set(-0.13, 0.98, 0.42);
            const olhoDir = new THREE.Mesh(new THREE.SphereGeometry(0.08, 16, 16), olhoMat);
            olhoDir.position.set(0.13, 0.98, 0.42);
            grupo.add(olhoEsq, olhoDir);
            
            const pupilaMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
            const pupilaEsq = new THREE.Mesh(new THREE.SphereGeometry(0.05, 16, 16), pupilaMat);
            pupilaEsq.position.set(-0.13, 0.96, 0.5);
            const pupilaDir = new THREE.Mesh(new THREE.SphereGeometry(0.05, 16, 16), pupilaMat);
            pupilaDir.position.set(0.13, 0.96, 0.5);
            grupo.add(pupilaEsq, pupilaDir);
            
            const elemento = new THREE.Mesh(
                tipo === 'fire' ? new THREE.ConeGeometry(0.2, 0.4, 8) : new THREE.SphereGeometry(0.15, 8, 8),
                new THREE.MeshStandardMaterial({ color: cor, emissive: cor, emissiveIntensity: 0.5 })
            );
            elemento.position.y = 1.15;
            grupo.add(elemento);
            
            grupo.position.set(x, 0, z);
            scene.add(grupo);
            return grupo;
        }
        
        personagemFogo.mesh = criarPersonagem(-3, -3, 0xff6600, 'fire');
        personagemAgua.mesh = criarPersonagem(3, -3, 0x3399ff, 'water');

        // ========== ESTADO DO JOGO ==========
        let personagemAtivo = 'fire';
        let nivel = 1;
        let completouNivel = false;
        let jogoAtivo = true;
        let tempoDecorrido = 0;
        let invencivel = 0;
        
        // Controles
        const teclas = { cima: false, baixo: false, esquerda: false, direita: false };
        const toqueState = { cima: false, baixo: false, esquerda: false, direita: false };
        let usandoToque = isMobile;
        
        function atualizarUI() {
            document.getElementById('fogoVida').innerHTML = personagemFogo.vida;
            document.getElementById('fogoVidaBar').style.width = `${personagemFogo.vida}%`;
            document.getElementById('fogoGem').innerHTML = personagemFogo.gemas;
            document.getElementById('aguaVida').innerHTML = personagemAgua.vida;
            document.getElementById('aguaVidaBar').style.width = `${personagemAgua.vida}%`;
            document.getElementById('aguaGem').innerHTML = personagemAgua.gemas;
            
            const cardFogo = document.getElementById('cardFogo');
            const cardAgua = document.getElementById('cardAgua');
            if (personagemAtivo === 'fire') {
                cardFogo.classList.add('ativo');
                cardAgua.classList.remove('ativo');
                luzFogo.intensity = 0.8;
                luzAgua.intensity = 0.3;
            } else {
                cardAgua.classList.add('ativo');
                cardFogo.classList.remove('ativo');
                luzFogo.intensity = 0.3;
                luzAgua.intensity = 0.8;
            }
            
            const totalGemas = personagemFogo.gemas + personagemAgua.gemas;
            if (totalGemas >= gems.length && !portal.ativo && !completouNivel) {
                portal.ativo = true;
                portal.anel.material.color.setHex(0x44ff44);
                portal.anel.material.emissiveIntensity = 0.8;
                mostrarMensagem("✨ PORTAL ABERTO! VÁ ATÉ ELE! ✨");
            }
        }
        
        function mostrarMensagem(texto) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'mensagem';
            msgDiv.textContent = texto;
            document.body.appendChild(msgDiv);
            setTimeout(() => msgDiv.remove(), 2500);
        }
        
        function aplicarDano(personagem, dano) {
            if (invencivel > 0) return;
            personagem.vida = Math.max(0, personagem.vida - dano);
            atualizarUI();
            
            const flash = document.createElement('div');
            flash.className = 'flash-dano';
            document.body.appendChild(flash);
            setTimeout(() => flash.remove(), 300);
            
            if (personagem.vida <= 0) {
                jogoAtivo = false;
                const div = document.createElement('div');
                div.className = 'gameover';
                div.innerHTML = `<h1>💀 GAME OVER 💀</h1><p>${personagem.tipo === 'fire' ? '🔥 FOGO' : '💧 ÁGUA'} foi derrotado!</p><button onclick="location.reload()">🔁 JOGAR NOVAMENTE</button>`;
                document.body.appendChild(div);
            }
        }
        
        function completarNivel() {
            if (completouNivel) return;
            completouNivel = true;
            jogoAtivo = false;
            mostrarMensagem(`🎉 NÍVEL ${nivel} COMPLETO! 🎉`);
            
            for (let i = 0; i < 40; i++) {
                const conf = document.createElement('div');
                conf.style.position = 'absolute';
                conf.style.width = '8px';
                conf.style.height = '8px';
                conf.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 50%)`;
                conf.style.left = Math.random() * window.innerWidth + 'px';
                conf.style.top = '-10px';
                conf.style.pointerEvents = 'none';
                document.body.appendChild(conf);
                let y = 0;
                const cair = () => { y += 6; conf.style.top = y + 'px'; if (y < window.innerHeight) requestAnimationFrame(cair); else conf.remove(); };
                cair();
            }
            
            setTimeout(() => {
                nivel++;
                if (nivel > 3) {
                    mostrarMensagem("🏆 PARABÉNS! VOCÊ ZEROU O JOGO! 🏆");
                } else {
                    reiniciarJogo();
                }
            }, 3000);
        }
        
        function reiniciarJogo() {
            if (nivel > 3) nivel = 1;
            jogoAtivo = true;
            completouNivel = false;
            portal.ativo = false;
            portal.anel.material.color.setHex(0xffaa00);
            portal.anel.material.emissiveIntensity = 0;
            personagemAtivo = 'fire';
            invencivel = 0;
            
            personagemFogo.vida = 100;
            personagemFogo.gemas = 0;
            personagemFogo.x = -3;
            personagemFogo.z = -3;
            personagemFogo.mesh.position.set(-3, 0, -3);
            
            personagemAgua.vida = 100;
            personagemAgua.gemas = 0;
            personagemAgua.x = 3;
            personagemAgua.z = -3;
            personagemAgua.mesh.position.set(3, 0, -3);
            
            for (let g of gems) {
                if (g.coletada) {
                    g.coletada = false;
                    scene.add(g.mesh);
                }
            }
            
            for (let b of botoes) {
                b.pressionado = false;
                b.mesh.position.y = 0.15;
                b.mesh.material.color.setHex(0xffaa44);
                b.anel.material.color.setHex(0xffaa44);
            }
            
            for (let p of portas) {
                p.aberta = false;
                p.mesh.position.y = 0.75;
            }
            
            atualizarUI();
            mostrarMensagem(`🔄 Nível ${nivel} - Colete todas as gemas!`);
        }
        
        function trocarPersonagem() {
            if (!jogoAtivo || completouNivel) return;
            personagemAtivo = personagemAtivo === 'fire' ? 'water' : 'fire';
            atualizarUI();
            mostrarMensagem(`🔄 Trocou para ${personagemAtivo === 'fire' ? '🔥 FOGO' : '💧 ÁGUA'}`);
        }
        
        // ========== MOVIMENTO ==========
        function getMovimento() {
            let mx = 0, mz = 0;
            if (usandoToque) {
                if (toqueState.cima) mz -= 1;
                if (toqueState.baixo) mz += 1;
                if (toqueState.esquerda) mx -= 1;
                if (toqueState.direita) mx += 1;
            } else {
                if (teclas.cima) mz -= 1;
                if (teclas.baixo) mz += 1;
                if (teclas.esquerda) mx -= 1;
                if (teclas.direita) mx += 1;
            }
            if (mx !== 0 || mz !== 0) {
                const len = Math.hypot(mx, mz);
                mx /= len;
                mz /= len;
            }
            return { mx, mz };
        }
        
        function atualizarMovimento(delta) {
            const { mx, mz } = getMovimento();
            const personagem = personagemAtivo === 'fire' ? personagemFogo : personagemAgua;
            const outro = personagemAtivo === 'fire' ? personagemAgua : personagemFogo;
            
            let novoX = personagem.x + mx * personagem.velocidade * delta;
            let novoZ = personagem.z + mz * personagem.velocidade * delta;
            const tamanho = 0.35;
            
            let podeX = true, podeZ = true;
            
            for (let w of walls) {
                if (Math.abs(novoX - w.x) < tamanho + w.sizeX && Math.abs(personagem.z - w.z) < tamanho + w.sizeZ) podeX = false;
                if (Math.abs(personagem.x - w.x) < tamanho + w.sizeX && Math.abs(novoZ - w.z) < tamanho + w.sizeZ) podeZ = false;
            }
            
            for (let p of portas) {
                if (!p.aberta) {
                    if (Math.abs(novoX - p.x) < tamanho + 0.4 && Math.abs(personagem.z - p.z) < tamanho + 0.4) podeX = false;
                    if (Math.abs(personagem.x - p.x) < tamanho + 0.4 && Math.abs(novoZ - p.z) < tamanho + 0.4) podeZ = false;
                }
            }
            
            if (Math.abs(novoX - outro.x) < tamanho + 0.35 && Math.abs(personagem.z - outro.z) < tamanho + 0.35) podeX = false;
            if (Math.abs(personagem.x - outro.x) < tamanho + 0.35 && Math.abs(novoZ - outro.z) < tamanho + 0.35) podeZ = false;
            
            if (podeX) personagem.x = novoX;
            if (podeZ) personagem.z = novoZ;
            
            personagem.mesh.position.x = personagem.x;
            personagem.mesh.position.z = personagem.z;
            
            if (mx !== 0 || mz !== 0) {
                personagem.mesh.rotation.y = Math.atan2(mx, mz);
            }
            
            personagem.mesh.position.y = Math.sin(Date.now() * 0.008) * 0.03;
            
            // Perigo
            if (personagem.tipo === 'fire') {
                for (let agua of zonasAgua) {
                    if (Math.hypot(personagem.x - agua.x, personagem.z - agua.z) < 0.6) {
                        aplicarDano(personagem, 8);
                    }
                }
            } else {
                for (let lava of zonasLava) {
                    if (Math.hypot(personagem.x - lava.x, personagem.z - lava.z) < 0.6) {
                        aplicarDano(personagem, 8);
                    }
                }
            }
            
            // Gemas
            for (let g of gems) {
                if (!g.coletada && g.tipo === personagem.tipo) {
                    if (Math.hypot(personagem.x - g.x, personagem.z - g.z) < 0.6) {
                        g.coletar();
                        personagem.gemas++;
                        atualizarUI();
                        mostrarMensagem(`${personagem.tipo === 'fire' ? '🔥' : '💧'} +1 Gema!`);
                    }
                }
            }
            
            // Botões
            for (let b of botoes) {
                if (!b.pressionado && Math.hypot(personagem.x - b.x, personagem.z - b.z) < 0.6) {
                    b.ativar();
                    mostrarMensagem(`🔘 Botão ${b.id + 1} ativado!`);
                }
            }
            
            // Portal
            const totalGemas = personagemFogo.gemas + personagemAgua.gemas;
            if (portal.ativo && totalGemas >= gems.length && Math.hypot(personagem.x - portal.x, personagem.z - portal.z) < 0.8) {
                completarNivel();
            }
        }
        
        function atualizarInimigos(delta) {
            const alvoFogo = personagemFogo.vida > 0 ? { x: personagemFogo.x, z: personagemFogo.z } : null;
            const alvoAgua = personagemAgua.vida > 0 ? { x: personagemAgua.x, z: personagemAgua.z } : null;
            
            for (let i of inimigos) {
                const alvo = i.alvo === 'fire' ? alvoFogo : alvoAgua;
                i.atualizar(alvo, delta);
                
                const personagemAlvo = i.alvo === 'fire' ? personagemFogo : personagemAgua;
                if (personagemAlvo.vida > 0) {
                    const dist = Math.hypot(i.x - personagemAlvo.x, i.z - personagemAlvo.z);
                    if (dist < 0.7 && personagemAlvo === (personagemAtivo === i.alvo ? personagemFogo : personagemAgua)) {
                        aplicarDano(personagemAlvo, 10);
                        invencivel = 0.8;
                    }
                }
            }
            
            if (invencivel > 0) invencivel -= delta;
        }
        
        function atualizarCamera() {
            const alvo = personagemAtivo === 'fire' ? personagemFogo : personagemAgua;
            camera.position.x += (alvo.x - camera.position.x) * 0.08;
            camera.position.z += (alvo.z + 9 - camera.position.z) * 0.08;
            camera.position.y += (9 - camera.position.y) * 0.05;
            camera.lookAt(alvo.x, 0, alvo.z);
        }
        
        // ========== CONTROLES ==========
        function initControles() {
            window.addEventListener('keydown', (e) => {
                const key = e.key;
                if (key === 'ArrowUp' || key === 'w' || key === 'W') { teclas.cima = true; e.preventDefault(); }
                if (key === 'ArrowDown' || key === 's' || key === 'S') { teclas.baixo = true; e.preventDefault(); }
                if (key === 'ArrowLeft' || key === 'a' || key === 'A') { teclas.esquerda = true; e.preventDefault(); }
                if (key === 'ArrowRight' || key === 'd' || key === 'D') { teclas.direita = true; e.preventDefault(); }
                if (key === 'Tab') { e.preventDefault(); trocarPersonagem(); }
                if (key === 'r' || key === 'R') { reiniciarJogo(); e.preventDefault(); }
                usandoToque = false;
            });
            
            window.addEventListener('keyup', (e) => {
                const key = e.key;
                if (key === 'ArrowUp' || key === 'w' || key === 'W') teclas.cima = false;
                if (key === 'ArrowDown' || key === 's' || key === 'S') teclas.baixo = false;
                if (key === 'ArrowLeft' || key === 'a' || key === 'A') teclas.esquerda = false;
                if (key === 'ArrowRight' || key === 'd' || key === 'D') teclas.direita = false;
            });
            
            const btnCima = document.getElementById('btnCima');
            const btnBaixo = document.getElementById('btnBaixo');
            const btnEsquerda = document.getElementById('btnEsquerda');
            const btnDireita = document.getElementById('btnDireita');
            
            if (btnCima) {
                btnCima.addEventListener('touchstart', (e) => { e.preventDefault(); toqueState.cima = true; });
                btnCima.addEventListener('touchend', () => toqueState.cima = false);
            }
            if (btnBaixo) {
                btnBaixo.addEventListener('touchstart', (e) => { e.preventDefault(); toqueState.baixo = true; });
                btnBaixo.addEventListener('touchend', () => toqueState.baixo = false);
            }
            if (btnEsquerda) {
                btnEsquerda.addEventListener('touchstart', (e) => { e.preventDefault(); toqueState.esquerda = true; });
                btnEsquerda.addEventListener('touchend', () => toqueState.esquerda = false);
            }
            if (btnDireita) {
                btnDireita.addEventListener('touchstart', (e) => { e.preventDefault(); toqueState.direita = true; });
                btnDireita.addEventListener('touchend', () => toqueState.direita = false);
            }
            
            document.getElementById('btnTrocar').addEventListener('click', trocarPersonagem);
            document.getElementById('btnTrocar').addEventListener('touchstart', (e) => { e.preventDefault(); trocarPersonagem(); });
        }
        
        // ========== LOOP ==========
        let ultimoTempo = performance.now() / 1000;
        
        function animar() {
            const agora = performance.now() / 1000;
            let delta = Math.min(0.033, agora - ultimoTempo);
            if (delta <= 0) { ultimoTempo = agora; requestAnimationFrame(animar); return; }
            ultimoTempo = agora;
            
            if (jogoAtivo && !completouNivel) {
                atualizarMovimento(delta);
                atualizarInimigos(delta);
                atualizarCamera();
            }
            
            portal.anel.rotation.z += 0.02;
            luzFogo.position.set(personagemFogo.x, 1, personagemFogo.z);
            luzAgua.position.set(personagemAgua.x, 1, personagemAgua.z);
            
            renderer.render(scene, camera);
            requestAnimationFrame(animar);
        }
        
        // ========== INICIAR ==========
        function iniciar() {
            initControles();
            atualizarUI();
            
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('ui').style.display = 'block';
                mostrarMensagem(isMobile ? "👆 Toque nos botões! 🔥 TAB troca personagem" : "🎮 WASD mover | TAB troca | R reinicia");
            }, 1000);
            
            animar();
        }
        
        iniciar();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
