<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🔥 FOGO & ÁGUA 💧 - Templo dos Inimigos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            background: #000;
            touch-action: none;
        }
        
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
        }
        
        .character-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            gap: 10px;
            pointer-events: auto;
        }
        
        .char-card {
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 8px 12px;
            text-align: center;
            flex: 1;
            border: 2px solid;
            transition: all 0.3s;
        }
        
        .char-card.fire { border-color: #ff6600; }
        .char-card.water { border-color: #3399ff; }
        .char-card.active { transform: scale(1.02); background: rgba(0,0,0,0.95); }
        
        .char-name { font-size: 11px; font-weight: bold; margin-bottom: 4px; }
        .fire .char-name { color: #ff8844; }
        .water .char-name { color: #44aaff; }
        
        .char-stats { display: flex; justify-content: center; gap: 15px; font-size: 11px; }
        .char-stats span { color: white; }
        
        .health-bar { width: 100%; height: 4px; background: #333; border-radius: 2px; margin-top: 5px; overflow: hidden; }
        .fire .health-fill { background: linear-gradient(90deg, #ff6600, #ffaa44); height: 100%; transition: width 0.3s; }
        .water .health-fill { background: linear-gradient(90deg, #3399ff, #66ccff); height: 100%; transition: width 0.3s; }
        
        .objectives {
            position: absolute;
            top: 80px;
            left: 10px;
            right: 10px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            padding: 8px 12px;
            border-left: 3px solid #ffd700;
            pointer-events: auto;
        }
        
        .objectives p { color: white; font-size: 10px; margin: 2px 0; }
        .objectives .title { color: #ffd700; font-weight: bold; font-size: 11px; margin-bottom: 4px; }
        
        .swap-btn {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #ff6600, #3399ff);
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            pointer-events: auto;
            transition: transform 0.2s;
            z-index: 2000;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        
        .swap-btn:active { transform: scale(0.95); }
        
        .touch-controls {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 10px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            pointer-events: auto;
        }
        
        .touch-btn {
            width: 55px;
            height: 55px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            cursor: pointer;
            border: 2px solid rgba(255,255,255,0.3);
            transition: 0.05s linear;
        }
        
        .touch-btn:active { background: rgba(255,255,255,0.5); transform: scale(0.92); }
        
        .dpad { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .dpad-row { display: flex; gap: 5px; justify-content: center; }
        
        .message {
            position: absolute;
            bottom: 45%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.95);
            padding: 10px 20px;
            border-radius: 40px;
            color: #ffd700;
            font-size: 14px;
            font-weight: bold;
            white-space: nowrap;
            animation: fadeOut 2s forwards;
            pointer-events: none;
            z-index: 2000;
            text-align: center;
        }
        
        @keyframes fadeOut {
            0% { opacity: 1; transform: translateX(-50%) scale(1); }
            70% { opacity: 1; }
            100% { opacity: 0; transform: translateX(-50%) scale(1.1); visibility: hidden; }
        }
        
        .damage-flash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            animation: flash 0.3s;
            pointer-events: none;
            z-index: 1500;
        }
        
        @keyframes flash {
            0% { background: rgba(255,0,0,0); }
            50% { background: rgba(255,0,0,0.4); }
            100% { background: rgba(255,0,0,0); }
        }
        
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            color: white;
            z-index: 10000;
        }
        
        .loader { width: 200px; height: 3px; background: #333; border-radius: 2px; margin-top: 15px; overflow: hidden; }
        .loader-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ff6600, #3399ff); animation: loading 1s ease; }
        
        @keyframes loading { from { width: 0%; } to { width: 100%; } }
        
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            color: white;
            z-index: 5000;
            border: 2px solid #ff4444;
            min-width: 260px;
        }
        
        .game-over h1 { color: #ff4444; font-size: 32px; margin-bottom: 12px; }
        .game-over button {
            background: linear-gradient(135deg, #ff6600, #3399ff);
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            color: white;
            font-size: 14px;
            margin-top: 12px;
            cursor: pointer;
        }
        
        @media (min-width: 768px) {
            .char-name { font-size: 14px; }
            .char-stats { font-size: 13px; }
            .objectives p { font-size: 12px; }
            .swap-btn { bottom: 30px; padding: 15px 30px; font-size: 16px; }
        }
        
        @media (min-width: 1024px) {
            .touch-controls { display: none; }
            .swap-btn { bottom: 30px; }
        }
        
        @media (max-width: 767px) {
            .swap-btn { bottom: 100px; }
        }
    </style>
</head>
<body>
    <div id="loading">
        <h2>🔥 FOGO & ÁGUA 💧</h2>
        <div class="loader"><div class="loader-fill"></div></div>
        <p>Carregando...</p>
    </div>

    <div id="ui" style="display: none;">
        <div class="character-panel">
            <div class="char-card fire" id="fireCard">
                <div class="char-name">🔥 GUERREIRO DE FOGO</div>
                <div class="char-stats">
                    <span>❤️ <span id="fireHealth">100</span></span>
                    <span>⭐ <span id="fireGems">0</span></span>
                </div>
                <div class="health-bar"><div class="health-fill" id="fireHealthFill" style="width:100%"></div></div>
            </div>
            <div class="char-card water" id="waterCard">
                <div class="char-name">💧 GUERREIRA DE ÁGUA</div>
                <div class="char-stats">
                    <span>❤️ <span id="waterHealth">100</span></span>
                    <span>⭐ <span id="waterGems">0</span></span>
                </div>
                <div class="health-bar"><div class="health-fill" id="waterHealthFill" style="width:100%"></div></div>
            </div>
        </div>
        
        <div class="objectives">
            <div class="title">🎯 MISSÃO</div>
            <p>🔴 <span style="color:#ff8844">FOGO</span> coleta gemas VERMELHAS | 💧 <span style="color:#44aaff">ÁGUA</span> coleta gemas AZUIS</p>
            <p>🚪 Ative os 3 botões para abrir as portas</p>
            <p>👹 Fuja dos inimigos que perseguem!</p>
        </div>
        
        <button class="swap-btn" id="swapBtn">🔄 TROCAR (TAB)</button>
        
        <div class="touch-controls">
            <div class="dpad">
                <div class="dpad-row">
                    <div class="touch-btn" id="btnUp">▲</div>
                </div>
                <div class="dpad-row">
                    <div class="touch-btn" id="btnLeft">◀</div>
                    <div class="touch-btn" id="btnDown">▼</div>
                    <div class="touch-btn" id="btnRight">▶</div>
                </div>
            </div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.128.0/build/three.module.js';

        // Detectar mobile
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth < 768;
        
        // Configuração da cena
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a2a);
        scene.fog = new THREE.FogExp2(0x0a0a2a, 0.008);

        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(10, 12, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // Luzes
        const ambientLight = new THREE.AmbientLight(0x404060, 0.6);
        scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0xfff5e6, 1.2);
        dirLight.position.set(5, 12, 4);
        dirLight.castShadow = true;
        scene.add(dirLight);
        
        const backLight = new THREE.PointLight(0x4466cc, 0.3);
        backLight.position.set(-2, 4, -5);
        scene.add(backLight);
        
        const fireLight = new THREE.PointLight(0xff4400, 0.5, 12);
        scene.add(fireLight);
        
        const waterLight = new THREE.PointLight(0x3399ff, 0.5, 12);
        scene.add(waterLight);

        // Chão
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x2a1a0a, roughness: 0.7 });
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(22, 22), groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.5;
        ground.receiveShadow = true;
        scene.add(ground);
        
        const grid = new THREE.GridHelper(22, 20, 0xaa8866, 0x664422);
        grid.position.y = -0.45;
        scene.add(grid);

        // Pilares decorativos
        const pillarMat = new THREE.MeshStandardMaterial({ color: 0xccaa77, metalness: 0.3 });
        const pillarPositions = [
            [-8, -8], [8, -8], [-8, 8], [8, 8],
            [-6, -6], [6, -6], [-6, 6], [6, 6]
        ];
        pillarPositions.forEach(pos => {
            const pillar = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.7, 3, 8), pillarMat);
            pillar.position.set(pos[0], 1, pos[1]);
            pillar.castShadow = true;
            scene.add(pillar);
        });

        // ========== CLASSES ==========
        class Character {
            constructor(x, z, color, type) {
                this.type = type;
                this.x = x;
                this.z = z;
                this.health = 100;
                this.gems = 0;
                this.speed = 5;
                
                const group = new THREE.Group();
                const bodyMat = new THREE.MeshStandardMaterial({ color: color, emissive: color, emissiveIntensity: 0.2 });
                const body = new THREE.Mesh(new THREE.CylinderGeometry(0.45, 0.4, 0.9, 16), bodyMat);
                body.castShadow = true;
                body.position.y = 0.45;
                group.add(body);
                
                const headMat = new THREE.MeshStandardMaterial({ color: 0xffccaa });
                const head = new THREE.Mesh(new THREE.SphereGeometry(0.4, 32, 32), headMat);
                head.position.y = 0.9;
                head.castShadow = true;
                group.add(head);
                
                const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
                const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.08, 16, 16), eyeMat);
                leftEye.position.set(-0.13, 0.98, 0.42);
                const rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.08, 16, 16), eyeMat);
                rightEye.position.set(0.13, 0.98, 0.42);
                group.add(leftEye, rightEye);
                
                const elementMat = new THREE.MeshStandardMaterial({ color: color, emissive: color, emissiveIntensity: 0.5 });
                const element = type === 'fire' 
                    ? new THREE.Mesh(new THREE.ConeGeometry(0.2, 0.4, 8), elementMat)
                    : new THREE.Mesh(new THREE.SphereGeometry(0.15, 8, 8), elementMat);
                element.position.y = 1.15;
                group.add(element);
                
                group.position.set(x, 0, z);
                scene.add(group);
                this.mesh = group;
            }
            
            update(delta, moveX, moveZ, walls, doors, enemies, otherChar, lavaZones, waterZones, buttons, portal) {
                if (this.health <= 0) return false;
                
                let newX = this.x + moveX * this.speed * delta;
                let newZ = this.z + moveZ * this.speed * delta;
                const size = 0.35;
                
                let canX = true, canZ = true;
                for (let w of walls) {
                    if (Math.abs(newX - w.x) < size + w.sizeX && Math.abs(this.z - w.z) < size + w.sizeZ) canX = false;
                    if (Math.abs(this.x - w.x) < size + w.sizeX && Math.abs(newZ - w.z) < size + w.sizeZ) canZ = false;
                }
                
                for (let d of doors) {
                    if (!d.isOpen) {
                        if (Math.abs(newX - d.x) < size + 0.4 && Math.abs(this.z - d.z) < size + 0.4) canX = false;
                        if (Math.abs(this.x - d.x) < size + 0.4 && Math.abs(newZ - d.z) < size + 0.4) canZ = false;
                    }
                }
                
                if (otherChar && otherChar.health > 0) {
                    if (Math.abs(newX - otherChar.x) < size + 0.35 && Math.abs(this.z - otherChar.z) < size + 0.35) canX = false;
                    if (Math.abs(this.x - otherChar.x) < size + 0.35 && Math.abs(newZ - otherChar.z) < size + 0.35) canZ = false;
                }
                
                if (canX) this.x = newX;
                if (canZ) this.z = newZ;
                
                this.mesh.position.x = this.x;
                this.mesh.position.z = this.z;
                
                if (moveX !== 0 || moveZ !== 0) {
                    this.mesh.rotation.y = Math.atan2(moveX, moveZ);
                }
                
                this.mesh.position.y = Math.sin(Date.now() * 0.008) * 0.03;
                
                // Perigo
                if (this.type === 'fire') {
                    for (let water of waterZones) {
                        if (Math.hypot(this.x - water.x, this.z - water.z) < 0.6) {
                            this.takeDamage(8);
                            return true;
                        }
                    }
                } else {
                    for (let lava of lavaZones) {
                        if (Math.hypot(this.x - lava.x, this.z - lava.z) < 0.6) {
                            this.takeDamage(8);
                            return true;
                        }
                    }
                }
                
                // Gemas
                for (let gem of gems) {
                    if (!gem.collected && gem.type === this.type) {
                        if (Math.hypot(this.x - gem.x, this.z - gem.z) < 0.6) {
                            gem.collect();
                            this.gems++;
                            updateUI();
                            showMessage(`${this.type === 'fire' ? '🔥' : '💧'} +1 Gema!`);
                        }
                    }
                }
                
                // Botões
                for (let btn of buttons) {
                    if (!btn.pressed && Math.hypot(this.x - btn.x, this.z - btn.z) < 0.6) {
                        btn.activate();
                        showMessage(`🔘 Botão ${btn.id + 1} ativado!`);
                    }
                }
                
                // Portal
                const totalGemsCollected = fireCharacter.gems + waterCharacter.gems;
                if (portal.active && !levelComplete && totalGemsCollected >= gems.length && 
                    Math.hypot(this.x - portal.x, this.z - portal.z) < 0.8) {
                    completeLevel();
                }
                
                return true;
            }
            
            takeDamage(amount) {
                this.health = Math.max(0, this.health - amount);
                updateUI();
                const flash = document.createElement('div');
                flash.className = 'damage-flash';
                document.body.appendChild(flash);
                setTimeout(() => flash.remove(), 300);
                if (this.health <= 0) gameOver();
                return this.health <= 0;
            }
            
            getPosition() { return { x: this.x, z: this.z }; }
        }

        class Enemy {
            constructor(x, z, color, targetType, speed) {
                this.x = x;
                this.z = z;
                this.targetType = targetType;
                this.speed = speed;
                this.originalX = x;
                this.originalZ = z;
                
                const group = new THREE.Group();
                const bodyMat = new THREE.MeshStandardMaterial({ color: color, metalness: 0.5 });
                const body = new THREE.Mesh(new THREE.CylinderGeometry(0.45, 0.4, 0.8, 8), bodyMat);
                body.castShadow = true;
                group.add(body);
                
                const eyeMat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0x440000 });
                const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), eyeMat);
                leftEye.position.set(-0.15, 0.5, 0.35);
                const rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), eyeMat);
                rightEye.position.set(0.15, 0.5, 0.35);
                group.add(leftEye, rightEye);
                
                group.position.set(x, 0, z);
                scene.add(group);
                this.mesh = group;
                this.patrolAngle = Math.random() * Math.PI * 2;
            }
            
            update(targetPos, delta, level) {
                if (!targetPos) return;
                
                const dx = targetPos.x - this.x;
                const dz = targetPos.z - this.z;
                const dist = Math.hypot(dx, dz);
                const chaseRange = 5;
                
                if (dist < chaseRange) {
                    const angle = Math.atan2(dz, dx);
                    this.x += Math.cos(angle) * this.speed * delta;
                    this.z += Math.sin(angle) * this.speed * delta;
                    this.mesh.rotation.y = angle;
                } else {
                    this.patrolAngle += delta * 1.5;
                    this.x = this.originalX + Math.cos(this.patrolAngle) * 2;
                    this.z = this.originalZ + Math.sin(this.patrolAngle * 0.7) * 2;
                }
                
                this.x = Math.max(-9, Math.min(9, this.x));
                this.z = Math.max(-9, Math.min(9, this.z));
                this.mesh.position.x = this.x;
                this.mesh.position.z = this.z;
                this.mesh.position.y = Math.sin(Date.now() * 0.008) * 0.05;
            }
            
            getPosition() { return { x: this.x, z: this.z }; }
        }

        class Gem {
            constructor(x, z, type, color) {
                this.x = x;
                this.z = z;
                this.type = type;
                this.collected = false;
                
                const geometry = new THREE.OctahedronGeometry(0.25);
                const material = new THREE.MeshStandardMaterial({ color: color, emissive: color, emissiveIntensity: 0.3 });
                this.mesh = new THREE.Mesh(geometry, material);
                this.mesh.position.set(x, 0.2, z);
                this.mesh.castShadow = true;
                scene.add(this.mesh);
            }
            
            collect() {
                this.collected = true;
                scene.remove(this.mesh);
            }
        }

        class PressureButton {
            constructor(x, z, id) {
                this.x = x;
                this.z = z;
                this.id = id;
                this.pressed = false;
                
                const base = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.45, 0.1, 16), new THREE.MeshStandardMaterial({ color: 0x666666 }));
                base.position.set(x, 0.05, z);
                scene.add(base);
                
                this.btnMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.35, 0.15, 16), new THREE.MeshStandardMaterial({ color: 0xffaa44, emissive: 0x442200 }));
                this.btnMesh.position.set(x, 0.15, z);
                scene.add(this.btnMesh);
                
                this.ring = new THREE.Mesh(new THREE.TorusGeometry(0.4, 0.05, 16, 32), new THREE.MeshStandardMaterial({ color: 0xffaa44 }));
                this.ring.position.set(x, 0.08, z);
                this.ring.rotation.x = Math.PI / 2;
                scene.add(this.ring);
            }
            
            activate() {
                if (this.pressed) return;
                this.pressed = true;
                this.btnMesh.position.y = 0.08;
                this.btnMesh.material.color.setHex(0x44ff44);
                this.ring.material.color.setHex(0x44ff44);
                
                for (let door of doors) {
                    if (door.buttonId === this.id && !door.isOpen) {
                        door.isOpen = true;
                        let y = 0.75;
                        const animate = () => {
                            y += 0.1;
                            door.mesh.position.y = y;
                            if (y < 2) requestAnimationFrame(animate);
                        };
                        animate();
                    }
                }
            }
        }

        // ========== VARIÁVEIS GLOBAIS ==========
        let walls = [];
        let doors = [];
        let lavaZones = [];
        let waterZones = [];
        let gems = [];
        let buttons = [];
        let enemies = [];
        let portal = null;
        let fireCharacter, waterCharacter;
        let activeCharacter = 'fire';
        let currentLevel = 1;
        let levelComplete = false;
        let gameActive = true;
        let gameTime = 0;
        let timerInterval;
        
        // Controles
        const keys = { up: false, down: false, left: false, right: false };
        const touchState = { up: false, down: false, left: false, right: false };
        let useTouch = isMobile;
        
        // ========== CONSTRUIR NÍVEL ==========
        function buildLevel() {
            walls.forEach(w => scene.remove(w.mesh));
            walls = [];
            doors.forEach(d => scene.remove(d.mesh));
            doors = [];
            lavaZones.forEach(l => scene.remove(l.mesh));
            lavaZones = [];
            waterZones.forEach(w => scene.remove(w.mesh));
            waterZones = [];
            gems.forEach(g => scene.remove(g.mesh));
            gems = [];
            buttons.forEach(b => { scene.remove(b.btnMesh); scene.remove(b.ring); });
            buttons = [];
            enemies.forEach(e => scene.remove(e.mesh));
            enemies = [];
            if (portal) { scene.remove(portal.base); scene.remove(portal.ring); }
            
            const wallMat = new THREE.MeshStandardMaterial({ color: 0x8b7355, roughness: 0.7 });
            const lavaMat = new THREE.MeshStandardMaterial({ color: 0xff4400, emissive: 0x441100 });
            const waterMat = new THREE.MeshStandardMaterial({ color: 0x3399ff, emissive: 0x004466, transparent: true, opacity: 0.7 });
            
            // Paredes
            const wallPositions = [
                { x: 0, z: -8.5, w: 17, d: 0.3 }, { x: 0, z: 8.5, w: 17, d: 0.3 },
                { x: -8.5, z: 0, w: 0.3, d: 17 }, { x: 8.5, z: 0, w: 0.3, d: 17 },
                { x: -3.5, z: -3, w: 0.3, d: 4 }, { x: 3.5, z: -2, w: 0.3, d: 4 },
                { x: -2, z: 3.5, w: 5, d: 0.3 }, { x: 2, z: 2.5, w: 4, d: 0.3 }
            ];
            
            wallPositions.forEach(w => {
                const wall = new THREE.Mesh(new THREE.BoxGeometry(w.w, 1, w.d), wallMat);
                wall.position.set(w.x, 0.5, w.z);
                wall.castShadow = true;
                scene.add(wall);
                walls.push({ mesh: wall, x: w.x, z: w.z, sizeX: w.w / 2, sizeZ: w.d / 2 });
            });
            
            // Zonas de perigo
            const lavaSpots = [[-4.5, -3.5], [4.5, -3], [-3, 4], [3.5, 3.5]];
            lavaSpots.forEach(l => {
                const lava = new THREE.Mesh(new THREE.CylinderGeometry(0.7, 0.7, 0.1, 16), lavaMat);
                lava.position.set(l[0], -0.45, l[1]);
                scene.add(lava);
                lavaZones.push({ x: l[0], z: l[1], mesh: lava });
            });
            
            const waterSpots = [[-4, 3.5], [4, 3.5], [-3.5, -3.5], [3, -4]];
            waterSpots.forEach(w => {
                const water = new THREE.Mesh(new THREE.CylinderGeometry(0.7, 0.7, 0.1, 16), waterMat);
                water.position.set(w[0], -0.45, w[1]);
                scene.add(water);
                waterZones.push({ x: w[0], z: w[1], mesh: water });
            });
            
            // Gemas
            const fireGems = [[-5, -2], [2, -5], [-2.5, 5]];
            const waterGems = [[5, -2], [-2, 5], [2.5, -5]];
            fireGems.forEach(g => gems.push(new Gem(g[0], g[1], 'fire', 0xff6600)));
            waterGems.forEach(g => gems.push(new Gem(g[0], g[1], 'water', 0x3399ff)));
            
            // Botões
            const buttonPositions = [[-5, -4], [5, -4], [0, 6]];
            buttonPositions.forEach((pos, i) => {
                buttons.push(new PressureButton(pos[0], pos[1], i));
            });
            
            // Portas
            const doorPositions = [
                { x: -2, z: -6.5, buttonId: 0 }, { x: 2, z: -6.5, buttonId: 1 }, { x: 0, z: 6.5, buttonId: 2 }
            ];
            doorPositions.forEach(d => {
                const doorMesh = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.5, 0.1), new THREE.MeshStandardMaterial({ color: 0xaa8866 }));
                doorMesh.position.set(d.x, 0.75, d.z);
                doorMesh.castShadow = true;
                scene.add(doorMesh);
                doors.push({ ...d, isOpen: false, mesh: doorMesh });
            });
            
            // Inimigos
            const enemyConfigs = [
                { x: -3, z: -2, color: 0xcc3333, target: 'fire', speed: 1.3 },
                { x: 3, z: -2, color: 0x3366cc, target: 'water', speed: 1.3 },
                { x: 0, z: 3.5, color: 0xcc3333, target: 'fire', speed: 1.5 }
            ];
            enemyConfigs.forEach(e => {
                enemies.push(new Enemy(e.x, e.z, e.color, e.target, e.speed));
            });
            
            // Portal
            portal = {
                x: 0, z: -7, active: false,
                base: new THREE.Mesh(new THREE.CylinderGeometry(0.9, 1, 0.1, 16), new THREE.MeshStandardMaterial({ color: 0xffd700, emissive: 0x442200 })),
                ring: new THREE.Mesh(new THREE.TorusGeometry(0.7, 0.08, 16, 48), new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: 0x442200 }))
            };
            portal.base.position.set(portal.x, 0.05, portal.z);
            portal.ring.position.set(portal.x, 0.6, portal.z);
            portal.ring.rotation.x = Math.PI / 2;
            scene.add(portal.base, portal.ring);
        }
        
        // ========== UI ==========
        function updateUI() {
            if (fireCharacter) {
                document.getElementById('fireHealth').innerHTML = fireCharacter.health;
                document.getElementById('fireHealthFill').style.width = `${fireCharacter.health}%`;
                document.getElementById('fireGems').innerHTML = fireCharacter.gems;
            }
            if (waterCharacter) {
                document.getElementById('waterHealth').innerHTML = waterCharacter.health;
                document.getElementById('waterHealthFill').style.width = `${waterCharacter.health}%`;
                document.getElementById('waterGems').innerHTML = waterCharacter.gems;
            }
            
            const fireCard = document.getElementById('fireCard');
            const waterCard = document.getElementById('waterCard');
            if (activeCharacter === 'fire') {
                fireCard.classList.add('active');
                waterCard.classList.remove('active');
                fireLight.intensity = 0.8;
                waterLight.intensity = 0.3;
            } else {
                waterCard.classList.add('active');
                fireCard.classList.remove('active');
                fireLight.intensity = 0.3;
                waterLight.intensity = 0.8;
            }
            
            const totalGems = (fireCharacter?.gems || 0) + (waterCharacter?.gems || 0);
            if (totalGems >= gems.length && !portal.active && !levelComplete) {
                portal.active = true;
                portal.ring.material.color.setHex(0x44ff44);
                portal.ring.material.emissiveIntensity = 0.8;
                showMessage("✨ PORTAL ABERTO! VÁ ATÉ ELE! ✨");
            }
        }
        
        function showMessage(text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message';
            msgDiv.textContent = text;
            document.body.appendChild(msgDiv);
            setTimeout(() => msgDiv.remove(), 2500);
        }
        
        function completeLevel() {
            if (levelComplete) return;
            levelComplete = true;
            gameActive = false;
            showMessage(`🎉 NÍVEL ${currentLevel} COMPLETO! 🎉`);
            
            for (let i = 0; i < 40; i++) {
                const conf = document.createElement('div');
                conf.style.position = 'absolute';
                conf.style.width = '8px';
                conf.style.height = '8px';
                conf.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 50%)`;
                conf.style.left = Math.random() * window.innerWidth + 'px';
                conf.style.top = '-10px';
                conf.style.pointerEvents = 'none';
                document.body.appendChild(conf);
                let y = 0;
                const fall = () => { y += 6; conf.style.top = y + 'px'; if (y < window.innerHeight) requestAnimationFrame(fall); else conf.remove(); };
                fall();
            }
            
            setTimeout(() => {
                currentLevel++;
                if (currentLevel > 3) {
                    showMessage("🏆 PARABÉNS! VOCÊ ZEROU O JOGO! 🏆");
                } else {
                    resetGame();
                }
            }, 3000);
        }
        
        function gameOver() {
            gameActive = false;
            const div = document.createElement('div');
            div.className = 'game-over';
            div.innerHTML = `<h1>💀 GAME OVER 💀</h1><p>Nível: ${currentLevel}</p><button onclick="location.reload()">🔁 JOGAR NOVAMENTE</button>`;
            document.body.appendChild(div);
        }
        
        function swapCharacter() {
            if (!gameActive || levelComplete) return;
            activeCharacter = activeCharacter === 'fire' ? 'water' : 'fire';
            updateUI();
            showMessage(`🔄 Trocou para ${activeCharacter === 'fire' ? '🔥 FOGO' : '💧 ÁGUA'}`);
        }
        
        function resetGame() {
            if (currentLevel > 3) currentLevel = 1;
            gameActive = true;
            levelComplete = false;
            portal.active = false;
            
            buildLevel();
            
            if (fireCharacter) scene.remove(fireCharacter.mesh);
            if (waterCharacter) scene.remove(waterCharacter.mesh);
            
            fireCharacter = new Character(-3, -3, 0xff6600, 'fire');
            waterCharacter = new Character(3, -3, 0x3399ff, 'water');
            activeCharacter = 'fire';
            
            updateUI();
            showMessage(`🔄 Nível ${currentLevel} - Colete todas as gemas!`);
        }
        
        // ========== MOVIMENTO ==========
        function getMovement() {
            let moveX = 0, moveZ = 0;
            if (useTouch) {
                if (touchState.up) moveZ -= 1;
                if (touchState.down) moveZ += 1;
                if (touchState.left) moveX -= 1;
                if (touchState.right) moveX += 1;
            } else {
                if (keys.up) moveZ -= 1;
                if (keys.down) moveZ += 1;
                if (keys.left) moveX -= 1;
                if (keys.right) moveX += 1;
            }
            if (moveX !== 0 || moveZ !== 0) {
                const len = Math.hypot(moveX, moveZ);
                moveX /= len;
                moveZ /= len;
            }
            return { moveX, moveZ };
        }
        
        // ========== CÂMERA ==========
        function updateCamera() {
            const activeChar = activeCharacter === 'fire' ? fireCharacter : waterCharacter;
            if (!activeChar) return;
            const targetX = activeChar.x;
            const targetZ = activeChar.z;
            camera.position.x += (targetX - camera.position.x) * 0.08;
            camera.position.z += (targetZ + 9 - camera.position.z) * 0.08;
            camera.position.y += (9 - camera.position.y) * 0.05;
            camera.lookAt(targetX, 0, targetZ);
        }
        
        // ========== LOOP PRINCIPAL ==========
        let lastTime = performance.now() / 1000;
        
        function animate() {
            const now = performance.now() / 1000;
            let delta = Math.min(0.033, now - lastTime);
            if (delta <= 0) { lastTime = now; requestAnimationFrame(animate); return; }
            lastTime = now;
            
            if (gameActive && !levelComplete && fireCharacter && waterCharacter) {
                const { moveX, moveZ } = getMovement();
                const activeChar = activeCharacter === 'fire' ? fireCharacter : waterCharacter;
                const otherChar = activeCharacter === 'fire' ? waterCharacter : fireCharacter;
                
                activeChar.update(delta, moveX, moveZ, walls, doors, enemies, otherChar, lavaZones, waterZones, buttons, portal);
                
                // Atualizar inimigos
                enemies.forEach(enemy => {
                    let target = enemy.targetType === 'fire' ? fireCharacter : waterCharacter;
                    if (target && target.health > 0) {
                        enemy.update(target.getPosition(), delta, currentLevel);
                        const dist = Math.hypot(enemy.x - target.x, enemy.z - target.z);
                        if (dist < 0.7 && target === activeChar) {
                            target.takeDamage(10);
                        }
                    }
                });
                
                updateCamera();
            }
            
            fireLight.position.set(fireCharacter?.x || 0, 1, fireCharacter?.z || 0);
            waterLight.position.set(waterCharacter?.x || 0, 1, waterCharacter?.z || 0);
            if (portal) portal.ring.rotation.z += 0.02;
            
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        
        // ========== CONTROLES ==========
        function initControls() {
            // Teclado
            window.addEventListener('keydown', (e) => {
                const key = e.key;
                if (key === 'ArrowUp' || key === 'w' || key === 'W') { keys.up = true; e.preventDefault(); }
                if (key === 'ArrowDown' || key === 's' || key === 'S') { keys.down = true; e.preventDefault(); }
                if (key === 'ArrowLeft' || key === 'a' || key === 'A') { keys.left = true; e.preventDefault(); }
                if (key === 'ArrowRight' || key === 'd' || key === 'D') { keys.right = true; e.preventDefault(); }
                if (key === 'Tab') { e.preventDefault(); swapCharacter(); }
                if (key === 'r' || key === 'R') { resetGame(); e.preventDefault(); }
                useTouch = false;
            });
            
            window.addEventListener('keyup', (e) => {
                const key = e.key;
                if (key === 'ArrowUp' || key === 'w' || key === 'W') keys.up = false;
                if (key === 'ArrowDown' || key === 's' || key === 'S') keys.down = false;
                if (key === 'ArrowLeft' || key === 'a' || key === 'A') keys.left = false;
                if (key === 'ArrowRight' || key === 'd' || key === 'D') keys.right = false;
            });
            
            // Touch
            const btnUp = document.getElementById('btnUp');
            const btnDown = document.getElementById('btnDown');
            const btnLeft = document.getElementById('btnLeft');
            const btnRight = document.getElementById('btnRight');
            
            if (btnUp) {
                btnUp.addEventListener('touchstart', (e) => { e.preventDefault(); touchState.up = true; });
                btnUp.addEventListener('touchend', () => { touchState.up = false; });
                btnUp.addEventListener('touchcancel', () => { touchState.up = false; });
            }
            if (btnDown) {
                btnDown.addEventListener('touchstart', (e) => { e.preventDefault(); touchState.down = true; });
                btnDown.addEventListener('touchend', () => { touchState.down = false; });
            }
            if (btnLeft) {
                btnLeft.addEventListener('touchstart', (e) => { e.preventDefault(); touchState.left = true; });
                btnLeft.addEventListener('touchend', () => { touchState.left = false; });
            }
            if (btnRight) {
                btnRight.addEventListener('touchstart', (e) => { e.preventDefault(); touchState.right = true; });
                btnRight.addEventListener('touchend', () => { touchState.right = false; });
            }
            
            document.getElementById('swapBtn').addEventListener('click', swapCharacter);
            document.getElementById('swapBtn').addEventListener('touchstart', (e) => { e.preventDefault(); swapCharacter(); });
        }
        
        // ========== INICIAR ==========
        function init() {
            buildLevel();
            fireCharacter = new Character(-3, -3, 0xff6600, 'fire');
            waterCharacter = new Character(3, -3, 0x3399ff, 'water');
            initControls();
            
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('ui').style.display = 'block';
                showMessage(isMobile ? "👆 Toque nos botões! 🔴 FOGO 💧 ÁGUA" : "🎮 WASD | TAB troca | R reinicia");
            }, 1000);
            
            animate();
        }
        
        init();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
